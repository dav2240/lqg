backend:
  name: git-gateway
  branch: main

# Uploaded cover images land in the same root folder as everything else
# (no assets/ subfolder), referenced from the site root.
media_folder: ""
public_folder: "/"

publish_mode: simple

collections:
  - name: "catalog"
    label: "Catalog"
    files:
      - name: "items"
        label: "Items"
        file: "items.json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Cover Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Download Link"
                name: "link"
                widget: "string"
                hint: "Paste the SwiftUpload (or other host) link people should be redirected to."
              - { label: "Date Added", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Tags", name: "tags", widget: "list", required: false, hint: "Optional short labels, e.g. v1.2, beta" }
