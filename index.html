<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>THE VAULT — Releases</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/">THE<span>VAULT</span></a>
    <div class="tagline">// personal release archive</div>
  </div>
</header>

<section class="hero">
  <p class="hero-eyebrow">catalog v1.0</p>
  <h1>Everything I've<br>shipped, in one place.</h1>
  <p>Browse the archive below. Every entry links straight out to the hosted file — nothing lives on this server.</p>
</section>

<div class="search-row">
  <input id="search" class="search-input" type="text" placeholder="// search by title..." />
  <div class="count-chip" id="count">0 items</div>
</div>

<main id="grid" class="grid"></main>

<div id="empty" class="empty" style="display:none;">nothing matches that search.</div>

<footer class="footer">
  built &amp; maintained here · content managed via <a href="/admin.html">/admin.html</a>
</footer>

<script src="app.js"></script>

<!-- Handles invite/password-reset links that Netlify Identity emails out,
     then bounces the user into the admin panel to finish logging in. -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", (user) => {
      document.location.hash.match(/invite_token|recovery_token/) &&
        (document.location.href = "/admin.html" + document.location.hash);
    });
  }
</script>
</body>

</html>
